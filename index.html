<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale-1.0" />
    <title>Isanutri v5 - Nutritional Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      .preparing-for-export .no-export {
        display: none !important;
      }
      body.preparing-for-export #diet-plan-display-content, 
      body.preparing-for-export #diet-plan-viewer-content {
        width: 210mm; /* A4 width */
        height: auto;
        min-height: 297mm; /* A4 height */
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        margin: 0 auto;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
            },
            colors: {
              // New Professional Health Teal Palette mapped to 'sage' keys to maintain code compatibility
              sage: {
                DEFAULT: '#0D9488', // Teal 600
                '50': '#F0FDFA', // Teal 50
                '100': '#CCFBF1', // Teal 100
                '200': '#99F6E4', // Teal 200
                '300': '#5EEAD4', // Teal 300
                '400': '#2DD4BF', // Teal 400
                '500': '#14B8A6', // Teal 500
                '600': '#0D9488', // Teal 600 (Primary Brand Color)
                '700': '#0F766E', // Teal 700
                '800': '#115E59', // Teal 800
                '900': '#134E4A', // Teal 900
              },
              // Deep Blue/Slate for Text and Structure
              slate: {
                850: '#1e293b', 
                900: '#0f172a',
              },
              accent: {
                DEFAULT: '#0ea5e9', // Sky 500
                hover: '#0284c7', // Sky 600
              }
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 15px rgba(20, 184, 166, 0.3)',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'fade-in-down': 'fadeInDown 0.5s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.27.0",

    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js",
    "firebase/": "https://aistudiocdn.com/firebase@^12.4.0/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.4",
    "jspdf": "https://aistudiocdn.com/jspdf@^2.5.1",
    "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</html>
