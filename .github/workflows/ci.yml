name: CI Pipeline

# NOTE: To actually BLOCK merges on failure, enable branch protection on GitHub:
# Settings → Branches → Add rule for `main` → "Require status checks to pass
# before merging" and select the "Build and Test" and "Firestore Rules" checks.
# The jobs below fail the run automatically if any step exits non-zero.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Formatting (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,css,json,md}" "index.html"

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Type Check
        run: npm run type-check

      - name: Build Production Bundle
        run: npm run build

      - name: Run Unit & Component Tests with Coverage (Vitest)
        run: npm run test:coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run End-to-End Tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright Report on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 30

  firestore-rules:
    name: Firestore Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # The Firestore emulator runs on the JVM.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firestore Security Rules Tests (emulator)
        run: npm run test:rules
